<div class="fd-status-widget">
  <!-- Avatar + name banner -->
  <div class="fd-status-banner">
    <div class="fd-status-avatar-wrap">
      <img class="fd-status-avatar" src="" alt="" />
      <div class="fd-status-avatar-placeholder">?</div>
    </div>
    <div class="fd-status-name-row">
      <span class="fd-status-char-name">No character</span>
      <span class="fd-status-inject-badge" title="Status is injected into prompt" hidden>⚠️</span>
    </div>
  </div>

  <!-- Status fields -->
  <div class="fd-status-fields">
    <!-- populated by script.js -->
  </div>

  <!-- Footer toolbar -->
  <div class="fd-status-footer">
    <span class="fd-status-parse-hint" hidden>auto-parse on</span>
    <span class="fd-status-spacer"></span>
    <button class="fd-status-copy-btn" title="Copy status as XML">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
        <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
      </svg>
      Copy XML
    </button>
  </div>
</div>
